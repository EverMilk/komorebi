<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌿 Komorebi</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 50% 20%, #2a3b2e, #14201a);
      color: #eef3ee; height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    h1 { font-weight: 600; font-size: 1.4rem; margin: 0; opacity: 0.85; }
    #stage {
      width: 360px; height: 360px; border-radius: 24px;
      background: rgba(255,255,255,0.04); box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    #subtitle {
      min-height: 2.4em; max-width: 520px; text-align: center; font-size: 1.1rem;
      line-height: 1.4; padding: 0 16px;
    }
    #composer { display: flex; gap: 8px; width: min(520px, 90vw); }
    #input {
      flex: 1; padding: 12px 16px; border-radius: 999px; border: none;
      background: rgba(255,255,255,0.1); color: inherit; font-size: 1rem;
    }
    #send {
      padding: 12px 20px; border-radius: 999px; border: none; cursor: pointer;
      background: #6cc18a; color: #10241a; font-weight: 600;
    }
    #status { font-size: 0.8rem; opacity: 0.5; }
  </style>
</head>
<body>
  <h1>🌿 Komorebi</h1>
  <canvas id="stage" width="360" height="360"></canvas>
  <div id="subtitle">...</div>
  <form id="composer" autocomplete="off">
    <input id="input" placeholder="話しかけてみて…" />
    <button id="send" type="submit">送信</button>
  </form>
  <div id="status">connecting…</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
